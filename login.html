<!DOCTYPE html>
<html>
<head>
<title>Login - IULT</title>

<style>
body {
font-family:Poppins;
background:linear-gradient(135deg,#667eea,#764ba2);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box {
background:white;
padding:30px;
border-radius:15px;
width:300px;
text-align:center;
}

input {
width:100%;
padding:10px;
margin:10px 0;
}

button {
width:100%;
padding:10px;
background:#667eea;
color:white;
border:none;
cursor:pointer;
}

/* LOADER */
.loader {
display:none;
margin-top:15px;
}

.spinner {
border:5px solid #eee;
border-top:5px solid #667eea;
border-radius:50%;
width:40px;
height:40px;
animation:spin 1s linear infinite;
margin:auto;
}

@keyframes spin {
100% {transform:rotate(360deg);}
}
</style>

</head>

<body>

<div class="box">
<h2>LOGIN</h2>

<input type="email" id="email" placeholder="Enter Email">
<input type="password" id="pass" placeholder="Enter Password">

<button onclick="login()">Login</button>

<div class="loader" id="loader">
<div class="spinner"></div>
<p>Logging in...</p>
</div>

</div>

<script>
function login(){
let email = document.getElementById("email").value;

if(!email.endsWith("@chitkara.edu.in")){
alert("❌ Only Chitkara students allowed");
return;
}

// show loader
document.getElementById("loader").style.display="block";

// fake delay
setTimeout(()=>{
window.location.href="dashboard.html";
},2000);
}
</script>

</body>
</html>
