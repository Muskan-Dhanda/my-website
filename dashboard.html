<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<style>
body {
font-family:Poppins;
margin:0;
background:#f5f5f5;
}

.nav {
background:#667eea;
color:white;
padding:15px;
text-align:center;
font-size:20px;
}

.container {
padding:30px;
}

.card {
background:white;
padding:20px;
margin:15px 0;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.btn {
padding:10px 15px;
background:#667eea;
color:white;
border:none;
cursor:pointer;
margin-top:10px;
}
</style>

</head>

<body>

<div class="nav">
IULT Dashboard
</div>

<div class="container">

<div class="card">
<h3>Active Sessions</h3>
<p>3 Ongoing Sessions</p>
</div>

<div class="card">
<h3>Earnings</h3>
<p>₹250</p>
</div>

<div class="card">
<h3>Rating</h3>
<p>⭐ 4.9</p>
</div>

<button class="btn" onclick="startSession()">Start Session</button>

</div>

<script>
function startSession(){
alert("🎥 Session Started!\nTopic: AI Learning\nDuration: 30 mins");
}
</script>

</body>
</html>
